<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intense Oud — All Brands</title>
<style>
  :root {
    --oud: #241812;
    --gold: #b8863f;
    --cream: #faf6ef;
    --paper: #ffffff;
    --line: #e6ddc9;
    --ink: #241812;
    --ink-soft: #6b5d4d;
    --heritage: #7a4a2a;
    --designer: #8a6d1e;
    --celeb: #a5455a;
    --value: #4a6b52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 24px 64px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    margin-bottom: 18px;
  }
  .back-link:hover { color: var(--gold); }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--oud);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }
  .brand-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 32px;
    font-weight: 400;
    margin: 4px 0 0;
    color: var(--oud);
  }
  .meta { text-align: right; font-size: 12px; color: var(--ink-soft); }
  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .controls input[type=text] {
    flex: 1;
    min-width: 220px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--cream);
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-soft);
    user-select: none;
  }
  .chip:hover { border-color: var(--gold); color: var(--ink); }
  .chip.active { background: var(--oud); border-color: var(--oud); color: var(--cream); }
  select {
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    padding: 9px 10px;
    border-bottom: 2px solid var(--oud);
    white-space: nowrap;
  }
  tbody td { padding: 9px 10px; border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: #fbf6ec; }
  .rank-cell { color: var(--ink-soft); font-variant-numeric: tabular-nums; width: 32px; }
  .num-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--oud); }
  .price-cell { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-soft); }
  .cat-pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .cat-Middle { background: #f1e2d3; color: var(--heritage); }
  .cat-Global { background: #f0ead1; color: var(--designer); }
  .cat-Celebrity { background: #f6dee3; color: var(--celeb); }
  .cat-Value { background: #e2ead9; color: var(--value); }
  .table-footer { margin-top: 12px; font-size: 12px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="./index.html">&larr; Back to dashboard</a>
  <header>
    <div>
      <div class="brand-eyebrow">Intense Oud &middot; AKA Comp Solutions</div>
      <h1>All brands</h1>
    </div>
    <div class="meta" id="meta-info"></div>
  </header>

  <div class="panel">
    <div class="controls">
      <input type="text" id="search" placeholder="Search brand name...">
      <div class="chip active" data-cat="all">All</div>
      <div class="chip" data-cat="Middle East Heritage">Middle East Heritage</div>
      <div class="chip" data-cat="Global Luxury Designer">Global Luxury Designer</div>
      <div class="chip" data-cat="Celebrity / Lifestyle">Celebrity-Lifestyle</div>
      <div class="chip" data-cat="Value & Everyday Brands">Value &amp; Everyday</div>
      <select id="sort-select">
        <option value="count-desc">SKU count: high to low</option>
        <option value="count-asc">SKU count: low to high</option>
        <option value="name-asc">Brand: A to Z</option>
        <option value="avg-desc">Avg price: high to low</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Brand</th>
          <th>Category</th>
          <th style="text-align:right">SKUs</th>
          <th style="text-align:right">Avg price</th>
          <th style="text-align:right">Min</th>
          <th style="text-align:right">Max</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="table-footer" id="result-count"></div>
  </div>
</div>

const CAT_SHORT = {
  "Middle East Heritage": "Middle East Heritage",
  "Global Luxury Designer": "Global Luxury Designer",
  "Celebrity / Lifestyle": "Celebrity-Lifestyle",
  "Value & Everyday Brands": "Value & Everyday"
};
const CAT_CLASS = {
  "Middle East Heritage": "cat-Middle",
  "Global Luxury Designer": "cat-Global",
  "Celebrity / Lifestyle": "cat-Celebrity",
  "Value & Everyday Brands": "cat-Value"
};

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

document.getElementById('meta-info').textContent = `${BRANDS.length} brands · 2026-07-23`;

let activeCat = 'all';
let sortMode = 'count-desc';
let searchTerm = '';

function render() {
  let rows = BRANDS;
  if (activeCat !== 'all') rows = rows.filter(r => r[1] === activeCat);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    rows = rows.filter(r => r[0].toLowerCase().includes(t));
  }
  rows = rows.slice();
  switch (sortMode) {
    case 'count-desc': rows.sort((a,b) => b[2]-a[2]); break;
    case 'count-asc': rows.sort((a,b) => a[2]-b[2]); break;
    case 'name-asc': rows.sort((a,b) => a[0].localeCompare(b[0])); break;
    case 'avg-desc': rows.sort((a,b) => b[3]-a[3]); break;
  }
  document.getElementById('table-body').innerHTML = rows.map((r, i) => {
    const [d,c,count,avg,min,max] = r;
    return `<tr>
      <td class="rank-cell">${i+1}</td>
      <td>${d}</td>
      <td><span class="cat-pill ${CAT_CLASS[c]}">${CAT_SHORT[c]}</span></td>
      <td class="num-cell">${count}</td>
      <td class="price-cell">${fmt(avg)}</td>
      <td class="price-cell">${fmt(min)}</td>
      <td class="price-cell">${fmt(max)}</td>
    </tr>`;
  }).join('');
  document.getElementById('result-count').textContent = `${rows.length.toLocaleString()} brand${rows.length===1?'':'s'} shown`;
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCat = chip.dataset.cat;
    render();
  });
});
document.getElementById('sort-select').addEventListener('change', e => { sortMode = e.target.value; render(); });
document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });

render();
</script>
