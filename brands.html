<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intense Oud — All Brands</title>
<style>
  :root {
    --oud: #241812;
    --gold: #b8863f;
    --cream: #faf6ef;
    --paper: #ffffff;
    --line: #e6ddc9;
    --ink: #241812;
    --ink-soft: #6b5d4d;
    --heritage: #7a4a2a;
    --designer: #8a6d1e;
    --celeb: #a5455a;
    --value: #4a6b52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1000px; margin: 0 auto; padding: 32px 24px 64px; }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    text-decoration: none;
    margin-bottom: 18px;
  }
  .back-link:hover { color: var(--gold); }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--oud);
    padding-bottom: 18px;
    margin-bottom: 24px;
  }
  .brand-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 32px;
    font-weight: 400;
    margin: 4px 0 0;
    color: var(--oud);
  }
  .meta { text-align: right; font-size: 12px; color: var(--ink-soft); }
  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px;
  }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .controls input[type=text] {
    flex: 1;
    min-width: 220px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--cream);
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-soft);
    user-select: none;
  }
  .chip:hover { border-color: var(--gold); color: var(--ink); }
  .chip.active { background: var(--oud); border-color: var(--oud); color: var(--cream); }
  select {
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
  }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    padding: 9px 10px;
    border-bottom: 2px solid var(--oud);
    white-space: nowrap;
  }
  tbody td { padding: 9px 10px; border-bottom: 1px solid var(--line); }
  tbody tr:hover { background: #fbf6ec; cursor: pointer; }
  tbody tr.active-row { background: #f1e8d4; }
  .rank-cell { color: var(--ink-soft); font-variant-numeric: tabular-nums; width: 32px; }
  .num-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--oud); }
  .price-cell { text-align: right; font-variant-numeric: tabular-nums; color: var(--ink-soft); }
  .cat-pill { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 10px; font-weight: 600; white-space: nowrap; }
  .cat-Middle { background: #f1e2d3; color: var(--heritage); }
  .cat-Global { background: #f0ead1; color: var(--designer); }
  .cat-Celebrity { background: #f6dee3; color: var(--celeb); }
  .cat-Value { background: #e2ead9; color: var(--value); }
  .table-footer { margin-top: 12px; font-size: 12px; color: var(--ink-soft); }
</style>
</head>
<body>
<div class="wrap">
  <a class="back-link" href="./index.html">&larr; Back to dashboard</a>
  <header>
    <div>
      <div class="brand-eyebrow">Intense Oud</div>
      <h1>All brands</h1>
    </div>
    <div class="meta" id="meta-info"></div>
  </header>

  <div class="panel">
    <div class="controls">
      <input type="text" id="search" placeholder="Search brand name...">
      <div class="chip active" data-cat="all">All</div>
      <div class="chip" data-cat="Middle East Heritage">Middle East Heritage</div>
      <div class="chip" data-cat="Global Luxury Designer">Global Luxury Designer</div>
      <div class="chip" data-cat="Celebrity / Lifestyle">Celebrity-Lifestyle</div>
      <div class="chip" data-cat="Value & Everyday Brands">Value &amp; Everyday</div>
      <select id="sort-select">
        <option value="count-desc">SKU count: high to low</option>
        <option value="count-asc">SKU count: low to high</option>
        <option value="name-asc">Brand: A to Z</option>
        <option value="avg-desc">Avg price: high to low</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>Brand</th>
          <th>Category</th>
          <th style="text-align:right">SKUs</th>
          <th style="text-align:right">Avg price</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="table-footer" id="result-count"></div>
  </div>

  <div class="panel" id="sku-panel" style="display:none; margin-top:22px;">
    <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:14px;">
      <h2 style="margin:0; font-family:Georgia,serif; font-weight:400; font-size:18px; color:var(--oud);" id="sku-panel-title">SKUs</h2>
      <a href="#" id="sku-panel-close" style="font-size:12.5px; color:var(--ink-soft); text-decoration:none;">Close &times;</a>
    </div>
    <div class="price-filter" style="margin-bottom:18px;">
      <div style="display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;">
        <span style="font-size:12.5px; color:var(--ink-soft); font-weight:600;">Filter by price</span>
        <span id="price-filter-readout" style="font-size:13px; color:var(--oud); font-weight:600;"></span>
      </div>
      <div class="slider-track-wrap" style="position:relative; height:32px;">
        <div class="slider-track" style="position:absolute; top:14px; left:0; right:0; height:4px; background:var(--line); border-radius:2px;"></div>
        <div class="slider-fill" id="slider-fill" style="position:absolute; top:14px; height:4px; background:var(--gold); border-radius:2px;"></div>
        <input type="range" id="price-min" style="position:absolute; top:0; width:100%; margin:0; -webkit-appearance:none; appearance:none; background:transparent; pointer-events:none;">
        <input type="range" id="price-max" style="position:absolute; top:0; width:100%; margin:0; -webkit-appearance:none; appearance:none; background:transparent; pointer-events:none;">
      </div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:2px;">
        <span id="sku-filter-count" style="font-size:12px; color:var(--ink-soft);"></span>
        <a href="#" id="price-clear" style="font-size:12px; color:var(--gold); text-decoration:none;">Reset range</a>
      </div>
    </div>
    <style>
      .price-filter input[type=range]::-webkit-slider-thumb {
        -webkit-appearance: none;
        pointer-events: auto;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: var(--oud);
        border: 2px solid var(--paper);
        box-shadow: 0 0 0 1px var(--line);
        cursor: pointer;
        margin-top: 8px;
      }
      .price-filter input[type=range]::-moz-range-thumb {
        pointer-events: auto;
        width: 16px; height: 16px;
        border-radius: 50%;
        background: var(--oud);
        border: 2px solid var(--paper);
        box-shadow: 0 0 0 1px var(--line);
        cursor: pointer;
      }
      .price-filter input[type=range]::-webkit-slider-runnable-track { background: transparent; }
      .price-filter input[type=range]::-moz-range-track { background: transparent; }
    </style>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Origin</th>
          <th>Barcode</th>
          <th style="text-align:right">Price</th>
        </tr>
      </thead>
      <tbody id="sku-table-body"></tbody>
    </table>
  </div>
</div>

// row: [designer, category, code, description, origin, price]

const CAT_SHORT = {
  "Middle East Heritage": "Middle East Heritage",
  "Global Luxury Designer": "Global Luxury Designer",
  "Celebrity / Lifestyle": "Celebrity-Lifestyle",
  "Value & Everyday Brands": "Value & Everyday"
};
const CAT_CLASS = {
  "Middle East Heritage": "cat-Middle",
  "Global Luxury Designer": "cat-Global",
  "Celebrity / Lifestyle": "cat-Celebrity",
  "Value & Everyday Brands": "cat-Value"
};

function fmt(n) { return '$' + n.toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }

document.getElementById('meta-info').textContent = `${BRANDS.length} brands · 2026-07-23`;

let activeCat = 'all';
let sortMode = 'count-desc';
let searchTerm = '';

function render() {
  let rows = BRANDS;
  if (activeCat !== 'all') rows = rows.filter(r => r[1] === activeCat);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    rows = rows.filter(r => r[0].toLowerCase().includes(t));
  }
  rows = rows.slice();
  switch (sortMode) {
    case 'count-desc': rows.sort((a,b) => b[2]-a[2]); break;
    case 'count-asc': rows.sort((a,b) => a[2]-b[2]); break;
    case 'name-asc': rows.sort((a,b) => a[0].localeCompare(b[0])); break;
    case 'avg-desc': rows.sort((a,b) => b[3]-a[3]); break;
  }
  document.getElementById('table-body').innerHTML = rows.map((r, i) => {
    const [d,c,count,avg,min,max] = r;
    const activeClass = selectedBrand === d ? ' active-row' : '';
    return `<tr class="brand-row${activeClass}" data-brand="${d.replace(/"/g,'&quot;')}">
      <td class="rank-cell">${i+1}</td>
      <td>${d}</td>
      <td><span class="cat-pill ${CAT_CLASS[c]}">${CAT_SHORT[c]}</span></td>
      <td class="num-cell">${count}</td>
      <td class="price-cell">${fmt(avg)}</td>
    </tr>`;
  }).join('');
  document.getElementById('result-count').textContent = `${rows.length.toLocaleString()} brand${rows.length===1?'':'s'} shown`;
  document.querySelectorAll('.brand-row').forEach(row => {
    row.addEventListener('click', () => showSkus(row.dataset.brand));
  });
}

let selectedBrand = null;
let brandSkus = [];
let brandMinPrice = 0;
let brandMaxPrice = 0;

function showSkus(brand) {
  selectedBrand = brand;
  brandSkus = CATALOG.filter(r => r[0] === brand).sort((a,b) => b[5]-a[5]);
  const prices = brandSkus.map(r => r[5]);
  brandMinPrice = Math.min(...prices);
  brandMaxPrice = Math.max(...prices);
  document.getElementById('sku-panel-title').textContent = `${brand} — ${brandSkus.length} SKU${brandSkus.length===1?'':'s'}`;

  const step = brandMaxPrice - brandMinPrice > 50 ? 1 : 0.05;
  const minSlider = document.getElementById('price-min');
  const maxSlider = document.getElementById('price-max');
  [minSlider, maxSlider].forEach(s => {
    s.min = brandMinPrice;
    s.max = brandMaxPrice;
    s.step = step;
  });
  minSlider.value = brandMinPrice;
  maxSlider.value = brandMaxPrice;

  renderSkuTable();
  document.getElementById('sku-panel').style.display = 'block';
  document.getElementById('sku-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
  render();
}

function updateSliderFill() {
  const minSlider = document.getElementById('price-min');
  const maxSlider = document.getElementById('price-max');
  let lo = parseFloat(minSlider.value);
  let hi = parseFloat(maxSlider.value);
  if (lo > hi) { const t = lo; lo = hi; hi = t; }
  const range = brandMaxPrice - brandMinPrice || 1;
  const loPct = ((lo - brandMinPrice) / range) * 100;
  const hiPct = ((hi - brandMinPrice) / range) * 100;
  const fill = document.getElementById('slider-fill');
  fill.style.left = loPct + '%';
  fill.style.width = (hiPct - loPct) + '%';
  document.getElementById('price-filter-readout').textContent = `${fmt(lo)} – ${fmt(hi)}`;
}

function renderSkuTable() {
  updateSliderFill();
  let lo = parseFloat(document.getElementById('price-min').value);
  let hi = parseFloat(document.getElementById('price-max').value);
  if (lo > hi) { const t = lo; lo = hi; hi = t; }
  const filtered = brandSkus.filter(r => r[5] >= lo && r[5] <= hi);

  document.getElementById('sku-table-body').innerHTML = filtered.map(r => {
    const [d,c,code,desc,o,p,upc] = r;
    return `<tr>
      <td>${desc}</td>
      <td>${o}</td>
      <td style="font-variant-numeric:tabular-nums; color:var(--ink-soft); font-size:11.5px;">${upc || '—'}</td>
      <td class="price-cell" style="font-weight:600; color:var(--oud);">${fmt(p)}</td>
    </tr>`;
  }).join('');
  document.getElementById('sku-filter-count').textContent =
    filtered.length === brandSkus.length
      ? `${brandSkus.length} shown`
      : `${filtered.length} of ${brandSkus.length} shown`;
}

document.getElementById('price-min').addEventListener('input', renderSkuTable);
document.getElementById('price-max').addEventListener('input', renderSkuTable);
document.getElementById('price-clear').addEventListener('click', (e) => {
  e.preventDefault();
  document.getElementById('price-min').value = brandMinPrice;
  document.getElementById('price-max').value = brandMaxPrice;
  renderSkuTable();
});

document.getElementById('sku-panel-close').addEventListener('click', (e) => {
  e.preventDefault();
  selectedBrand = null;
  document.getElementById('sku-panel').style.display = 'none';
  render();
});

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCat = chip.dataset.cat;
    render();
  });
});
document.getElementById('sort-select').addEventListener('change', e => { sortMode = e.target.value; render(); });
document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });

render();
</script>
