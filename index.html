<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Intense Oud — Catalog Dashboard</title>
<style>
  :root {
    --oud: #241812;
    --oud-2: #3a2a1e;
    --gold: #b8863f;
    --gold-light: #e8d5b5;
    --cream: #faf6ef;
    --paper: #ffffff;
    --line: #e6ddc9;
    --ink: #241812;
    --ink-soft: #6b5d4d;
    --heritage: #7a4a2a;
    --designer: #8a6d1e;
    --celeb: #a5455a;
    --value: #4a6b52;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--cream);
    color: var(--ink);
    font-family: -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
  }
  .wrap { max-width: 1180px; margin: 0 auto; padding: 32px 24px 64px; }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    border-bottom: 2px solid var(--oud);
    padding-bottom: 18px;
    margin-bottom: 28px;
  }
  .brand-eyebrow {
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    font-weight: 600;
  }
  h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 34px;
    font-weight: 400;
    margin: 4px 0 0;
    color: var(--oud);
    letter-spacing: 0.01em;
  }
  .meta { text-align: right; font-size: 12px; color: var(--ink-soft); line-height: 1.6; }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 14px;
    margin-bottom: 28px;
  }
  .kpi {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 16px 18px;
    position: relative;
    overflow: hidden;
  }
  .kpi::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--bar, var(--gold));
  }
  .kpi .label {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  .kpi .num {
    font-size: 22px;
    font-weight: 600;
    color: var(--oud);
    font-variant-numeric: tabular-nums;
  }
  .kpi .sub {
    font-size: 11px;
    color: var(--ink-soft);
    margin-top: 3px;
  }
  .panel {
    background: var(--paper);
    border: 1px solid var(--line);
    border-radius: 4px;
    padding: 20px 22px;
    margin-bottom: 22px;
  }
  .panel h2 {
    font-family: Georgia, serif;
    font-weight: 400;
    font-size: 18px;
    margin: 0 0 14px;
    color: var(--oud);
  }
  .chart-row { display: grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }
  .bar-list { display: flex; flex-direction: column; gap: 10px; }
  .bar-item { display: grid; grid-template-columns: 160px 1fr 90px; align-items: center; gap: 10px; font-size: 12.5px; }
  .bar-track { background: #f1ead9; border-radius: 3px; height: 16px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px 0 0 3px; }
  .bar-val { text-align: right; color: var(--ink-soft); font-variant-numeric: tabular-nums; }
  .legend-dot { display: inline-block; width: 9px; height: 9px; border-radius: 2px; margin-right: 6px; }
  .top-designers { display: flex; flex-direction: column; gap: 8px; }
  .td-row { display: flex; justify-content: space-between; align-items: center; font-size: 13px; padding: 6px 0; border-bottom: 1px solid var(--line); }
  .td-row:last-child { border-bottom: none; }
  .td-name { color: var(--ink); }
  .td-cat { font-size: 10.5px; color: var(--ink-soft); }
  .td-count { font-weight: 600; color: var(--oud); font-variant-numeric: tabular-nums; }
  .controls {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
    align-items: center;
  }
  .controls input[type=text] {
    flex: 1;
    min-width: 220px;
    padding: 9px 12px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--cream);
  }
  .chip {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--line);
    background: var(--paper);
    font-size: 12.5px;
    cursor: pointer;
    color: var(--ink-soft);
    transition: all .12s;
    user-select: none;
  }
  .chip:hover { border-color: var(--gold); color: var(--ink); }
  .chip.active {
    background: var(--oud);
    border-color: var(--oud);
    color: var(--cream);
  }
  select {
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 4px;
    font-size: 13px;
    background: var(--paper);
    color: var(--ink);
  }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  thead th {
    text-align: left;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-soft);
    padding: 8px 10px;
    border-bottom: 2px solid var(--oud);
    cursor: pointer;
    white-space: nowrap;
  }
  thead th:hover { color: var(--gold); }
  tbody td {
    padding: 8px 10px;
    border-bottom: 1px solid var(--line);
    vertical-align: top;
  }
  tbody tr:hover { background: #fbf6ec; }
  .desc-cell { color: var(--ink-soft); max-width: 380px; }
  .price-cell { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; color: var(--oud); white-space: nowrap; }
  .cat-pill {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    white-space: nowrap;
  }
  .cat-Middle { background: #f1e2d3; color: var(--heritage); }
  .cat-Global { background: #f0ead1; color: var(--designer); }
  .cat-Celebrity { background: #f6dee3; color: var(--celeb); }
  .cat-Value { background: #e2ead9; color: var(--value); }
  .table-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 12px;
    font-size: 12px;
    color: var(--ink-soft);
  }
  @media (max-width: 900px) {
    .kpi-row { grid-template-columns: repeat(2, 1fr); }
    .chart-row { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <div class="brand-eyebrow">Intense Oud &middot; AKA Comp Solutions</div>
      <h1>Catalog dashboard</h1>
    </div>
    <div class="meta">
      <div id="meta-info"></div>
    </div>
  </header>

  <div class="kpi-row" id="kpi-row"></div>

  <div class="panel">
    <h2>Catalog value by category</h2>
    <div class="chart-row">
      <div class="bar-list" id="bar-list"></div>
      <div class="top-designers" id="top-designers"></div>
    </div>
  </div>

  <div class="panel">
    <h2>Browse catalog</h2>
    <div class="controls">
      <input type="text" id="search" placeholder="Search description, item code, or designer...">
      <div class="chip active" data-cat="all">All</div>
      <div class="chip" data-cat="Middle East Heritage">Middle East Heritage</div>
      <div class="chip" data-cat="Global Luxury Designer">Global Luxury Designer</div>
      <div class="chip" data-cat="Celebrity / Lifestyle">Celebrity-Lifestyle</div>
      <div class="chip" data-cat="Value & Everyday Brands">Value &amp; Everyday</div>
      <select id="sort-select">
        <option value="price-desc">Price: high to low</option>
        <option value="price-asc">Price: low to high</option>
        <option value="designer-asc">Designer: A to Z</option>
        <option value="code-asc">Item code</option>
      </select>
    </div>
    <table>
      <thead>
        <tr>
          <th>Designer</th>
          <th>Category</th>
          <th>Item code</th>
          <th>Description</th>
          <th>Origin</th>
          <th style="text-align:right">Price</th>
        </tr>
      </thead>
      <tbody id="table-body"></tbody>
    </table>
    <div class="table-footer">
      <span id="result-count"></span>
      <span id="page-note">Showing top 200 matches — refine your search to narrow further.</span>
    </div>
  </div>

</div>

  grandTotal += p;
  const key = d + '||' + c;
  designerCount[key] = (designerCount[key] || 0) + 1;
});

// --- KPI row ---
const kpiRow = document.getElementById('kpi-row');
const kpiHtml = [];
kpiHtml.push(`<div class="kpi" style="--bar:var(--gold)"><div class="label">Total SKUs</div><div class="num">${grandCount.toLocaleString()}</div><div class="sub">${fmt(grandTotal)} catalog value</div></div>`);
CAT_ORDER.forEach(c => {
  const s = catStats[c];
  kpiHtml.push(`<div class="kpi" style="--bar:${CAT_COLORS[c]}"><div class="label">${CAT_SHORT[c]}</div><div class="num">${s.count.toLocaleString()}</div><div class="sub">avg ${fmt(s.count? s.total/s.count : 0)}</div></div>`);
});
kpiRow.innerHTML = kpiHtml.join('');

document.getElementById('meta-info').innerHTML = `Last updated: 2026-07-23, 2:57 PM CT<br>Source: Nikhil@perfume-center.com`;

// --- Bar chart (category value) ---
const maxTotal = Math.max(...CAT_ORDER.map(c => catStats[c].total));
const barList = document.getElementById('bar-list');
barList.innerHTML = CAT_ORDER.map(c => {
  const s = catStats[c];
  const pct = maxTotal ? (s.total / maxTotal * 100) : 0;
  return `<div class="bar-item">
    <span><span class="legend-dot" style="background:${CAT_COLORS[c]}"></span>${CAT_SHORT[c]}</span>
    <div class="bar-track"><div class="bar-fill" style="width:${pct}%;background:${CAT_COLORS[c]}"></div></div>
    <span class="bar-val">${fmt(s.total)}</span>
  </div>`;
}).join('');

// --- Top designers overall ---
const topDesigners = Object.entries(designerCount)
  .map(([key, count]) => { const [d,c] = key.split('||'); return {d,c,count}; })
  .sort((a,b) => b.count - a.count)
  .slice(0, 8);
document.getElementById('top-designers').innerHTML = topDesigners.map(t =>
  `<div class="td-row"><div><div class="td-name">${t.d}</div><div class="td-cat">${CAT_SHORT[t.c]}</div></div><div class="td-count">${t.count}</div></div>`
).join('');

// --- Table / filter / search ---
let activeCat = 'all';
let sortMode = 'price-desc';
let searchTerm = '';

function render() {
  let rows = CATALOG;
  if (activeCat !== 'all') rows = rows.filter(r => r[1] === activeCat);
  if (searchTerm) {
    const t = searchTerm.toLowerCase();
    rows = rows.filter(r => r[0].toLowerCase().includes(t) || r[2].toLowerCase().includes(t) || r[3].toLowerCase().includes(t));
  }
  const total = rows.length;
  switch (sortMode) {
    case 'price-desc': rows = rows.slice().sort((a,b) => b[5]-a[5]); break;
    case 'price-asc': rows = rows.slice().sort((a,b) => a[5]-b[5]); break;
    case 'designer-asc': rows = rows.slice().sort((a,b) => a[0].localeCompare(b[0])); break;
    case 'code-asc': rows = rows.slice().sort((a,b) => a[2].localeCompare(b[2])); break;
  }
  const shown = rows.slice(0, 200);
  document.getElementById('table-body').innerHTML = shown.map(r => {
    const [d,c,code,desc,o,p] = r;
    return `<tr>
      <td>${d}</td>
      <td><span class="cat-pill ${CAT_CLASS[c]}">${CAT_SHORT[c]}</span></td>
      <td>${code}</td>
      <td class="desc-cell">${desc}</td>
      <td>${o}</td>
      <td class="price-cell">${fmt(p)}</td>
    </tr>`;
  }).join('');
  document.getElementById('result-count').textContent = `${total.toLocaleString()} matching SKU${total===1?'':'s'}`;
  document.getElementById('page-note').style.display = total > 200 ? 'inline' : 'none';
}

document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    activeCat = chip.dataset.cat;
    render();
  });
});
document.getElementById('sort-select').addEventListener('change', e => { sortMode = e.target.value; render(); });
document.getElementById('search').addEventListener('input', e => { searchTerm = e.target.value; render(); });

render();
</script>
</body>
</html>
